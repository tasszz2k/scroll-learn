<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Scroll Learn — Redesign</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiempos+Headline&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Claude-inspired warm editorial palette */
    --paper:        #F5F1EB;   /* warm off-white background */
    --paper-2:      #EFE9DF;   /* slightly deeper paper */
    --card:         #FBF8F2;   /* card surface */
    --ink:          #1F1B16;   /* near-black warm */
    --ink-2:        #3C342B;
    --ink-3:        #6B6157;   /* secondary text */
    --ink-4:        #9A8E81;   /* tertiary */
    --rule:         #E2D9CB;   /* hairline rules */
    --rule-2:       #D2C7B4;
    --clay:         #C96442;   /* signature terracotta */
    --clay-deep:    #A84E30;
    --clay-tint:    #EFD9CC;
    --clay-wash:    #F6E6DC;
    --moss:         #6E7B5C;   /* secondary accent */
    --gold:         #B8923A;
    --rose:         #C4736B;
    --bg-block:     #2A2520;   /* dark editorial block */
  }

  html, body { background: var(--paper); }
  body { margin: 0; font-family: 'Inter', system-ui, sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }

  .serif { font-family: 'Source Serif 4', 'Tiempos Headline', Georgia, serif; font-weight: 500; letter-spacing: -0.01em; }
  .display { font-family: 'Source Serif 4', Georgia, serif; font-weight: 500; letter-spacing: -0.025em; line-height: 1.02; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }

  /* Editorial helpers */
  .eyebrow { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .rule { border: 0; border-top: 1px solid var(--rule); }
  .rule-thick { border: 0; border-top: 2px solid var(--ink); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; font: 500 13.5px 'Inter', sans-serif; border-radius: 999px; border: 1px solid transparent; cursor: pointer; transition: all .15s; }
  .btn-clay { background: var(--clay); color: #FFF8F2; border-color: var(--clay); }
  .btn-clay:hover { background: var(--clay-deep); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--rule-2); }
  .btn-ghost:hover { border-color: var(--ink-3); background: var(--paper-2); }
  .btn-dark { background: var(--ink); color: var(--paper); }

  /* Tag / pill */
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; font: 500 11px 'JetBrains Mono', monospace; letter-spacing: .08em; text-transform: uppercase; border-radius: 999px; border: 1px solid var(--rule-2); color: var(--ink-3); background: var(--card); }
  .pill-clay { background: var(--clay-wash); border-color: var(--clay-tint); color: var(--clay-deep); }
  .pill-moss { background: #EAEEDF; border-color: #D6DEC0; color: #4F5B40; }
  .pill-ink { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* ASCII layer cake & diagrams */
  .ascii { font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.45; white-space: pre; color: var(--ink-2); }

  /* Diagram grids */
  .grid-diagram { background-image:
    linear-gradient(to right, var(--rule) 1px, transparent 1px),
    linear-gradient(to bottom, var(--rule) 1px, transparent 1px);
    background-size: 16px 16px;
  }

  /* Form inputs */
  .input { width: 100%; box-sizing: border-box; padding: 12px 14px; background: var(--card); border: 1px solid var(--rule-2); border-radius: 10px; font: 400 14px 'Inter', sans-serif; color: var(--ink); }
  .input:focus { outline: none; border-color: var(--clay); box-shadow: 0 0 0 3px var(--clay-tint); }

  /* Toggle switch */
  .switch { position: relative; width: 38px; height: 22px; background: var(--rule-2); border-radius: 999px; cursor: pointer; transition: background .15s; flex-shrink: 0; }
  .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; box-shadow: 0 1px 3px rgba(0,0,0,.18); transition: left .18s; }
  .switch.on { background: var(--clay); }
  .switch.on::after { left: 18px; }

  /* Drop cap */
  .dropcap::first-letter {
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 600;
    font-size: 3.4em;
    float: left;
    line-height: .85;
    margin: 6px 8px 0 0;
    color: var(--clay);
  }

  /* Number columns */
  .stat-num { font-family: 'Source Serif 4', Georgia, serif; font-weight: 500; font-size: 56px; line-height: 1; letter-spacing: -0.04em; color: var(--ink); }

  /* Card */
  .card-soft { background: var(--card); border: 1px solid var(--rule); border-radius: 14px; }
  .card-flat { background: var(--card); border: 1px solid var(--rule); }

  /* Browser frame chrome */
  .chrome {
    background: var(--paper-2);
    border-bottom: 1px solid var(--rule-2);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    font: 500 12px 'JetBrains Mono', monospace;
    color: var(--ink-3);
  }
  .chrome .dot { width: 10px; height: 10px; border-radius: 50%; }
  .chrome .url { flex: 1; background: var(--card); border: 1px solid var(--rule); border-radius: 999px; padding: 6px 14px; }

  /* Tab bar */
  .tab { padding: 14px 4px; font: 500 13px 'Inter'; color: var(--ink-3); border-bottom: 2px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
  .tab.active { color: var(--ink); border-bottom-color: var(--clay); }
  .tab .glyph { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-4); letter-spacing: 0; }
  .tab.active .glyph { color: var(--clay); }

  /* Quiz card layered look */
  .stack-shadow { box-shadow:
    0 0 0 1px var(--rule),
    8px 8px 0 -1px var(--paper-2),
    8px 8px 0 0 var(--rule),
    16px 16px 0 -1px var(--paper-2),
    16px 16px 0 0 var(--rule);
  }

  /* Diagrammatic cell */
  .cell {
    border: 1px solid var(--rule-2);
    background: var(--card);
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .cell.filled { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .cell.clay   { background: var(--clay); color: #FFF8F2; border-color: var(--clay); }
  .cell.tint   { background: var(--clay-wash); border-color: var(--clay-tint); color: var(--clay-deep); }

  /* Underline links */
  .ulink { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--ink-3); padding-bottom: 1px; }
  .ulink:hover { border-bottom-color: var(--clay); color: var(--clay-deep); }

  /* Data table */
  .dtable { width: 100%; border-collapse: collapse; font-size: 13px; }
  .dtable th { text-align: left; font: 500 11px 'JetBrains Mono', monospace; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3); padding: 10px 12px; border-bottom: 1px solid var(--rule); }
  .dtable td { padding: 12px 12px; border-bottom: 1px solid var(--rule); color: var(--ink-2); vertical-align: middle; }
  .dtable tr:last-child td { border-bottom: none; }
  .dtable tr:hover td { background: var(--paper-2); }

  /* progress bar */
  .bar { height: 4px; background: var(--rule); border-radius: 999px; overflow: hidden; }
  .bar > i { display:block; height:100%; background: var(--clay); }

  /* Scroll containers in artboards do NOT auto-scroll; sized to content */

  /* Sparkline-ish bars */
  .barchart { display: flex; align-items: flex-end; gap: 3px; height: 56px; }
  .barchart > i { display: block; width: 8px; background: var(--ink); border-radius: 1px; }
  .barchart > i.accent { background: var(--clay); }
  .barchart > i.muted  { background: var(--rule-2); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ---------- shared atoms ---------- */
function Eyebrow({ children, num }) {
  return <div style={{display:'flex', alignItems:'baseline', gap:10}}>
    {num && <span className="mono" style={{fontSize:11, color:'var(--ink-4)'}}>{num}</span>}
    <span className="eyebrow">{children}</span>
  </div>;
}

function Pill({ children, tone='default' }) {
  const cls = tone==='clay' ? 'pill pill-clay' : tone==='moss' ? 'pill pill-moss' : tone==='ink' ? 'pill pill-ink' : 'pill';
  return <span className={cls}>{children}</span>;
}

function Switch({ on }) {
  return <div className={'switch' + (on ? ' on' : '')} />;
}

function SectionHeader({ kicker, title, sub, action }) {
  return (
    <div style={{display:'flex', alignItems:'flex-end', justifyContent:'space-between', gap:24, paddingBottom:18, borderBottom:'1px solid var(--rule)'}}>
      <div>
        <Eyebrow>{kicker}</Eyebrow>
        <h2 className="display" style={{fontSize:42, margin:'10px 0 6px', maxWidth:560}}>{title}</h2>
        {sub && <p style={{margin:0, color:'var(--ink-3)', fontSize:14, maxWidth:520}}>{sub}</p>}
      </div>
      {action}
    </div>
  );
}

/* ============================================================== */
/* THEME / TYPE SPECIMEN                                           */
/* ============================================================== */
function ThemeSpecimen() {
  return (
    <div style={{padding:'48px 56px', width:1320, background:'var(--paper)'}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:28}}>
        <div>
          <Eyebrow num="01">Theme · Editorial Foundations</Eyebrow>
          <h1 className="display" style={{fontSize:88, margin:'12px 0 0', lineHeight:.95}}>Scroll <span style={{fontStyle:'italic', color:'var(--clay)'}}>Learn</span>,<br/>after the redesign.</h1>
        </div>
        <div style={{textAlign:'right'}}>
          <div className="mono" style={{fontSize:11, color:'var(--ink-3)'}}>VOL. 02 · ISSUE 04</div>
          <div className="mono" style={{fontSize:11, color:'var(--ink-3)'}}>APR 27, 2026</div>
        </div>
      </div>

      <hr className="rule-thick" />

      {/* Three column foundations */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:0, marginTop:32}}>
        {/* Palette */}
        <div style={{paddingRight:32, borderRight:'1px solid var(--rule)'}}>
          <Eyebrow num="A">Palette</Eyebrow>
          <h3 className="serif" style={{fontSize:22, margin:'10px 0 18px'}}>Warm paper, clay accent.</h3>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}}>
            {[
              ['#F5F1EB','Paper','--paper'],
              ['#EFE9DF','Paper 02','--paper-2'],
              ['#FBF8F2','Card','--card'],
              ['#1F1B16','Ink','--ink'],
              ['#6B6157','Ink 03','--ink-3'],
              ['#C96442','Clay','--clay'],
              ['#A84E30','Clay deep','--clay-deep'],
              ['#F6E6DC','Clay wash','--clay-wash'],
              ['#6E7B5C','Moss','--moss'],
              ['#B8923A','Gold','--gold'],
            ].map(([hex,name,tok])=>(
              <div key={hex} style={{border:'1px solid var(--rule)', background:'var(--card)'}}>
                <div style={{height:48, background:hex, borderBottom:'1px solid var(--rule)'}}/>
                <div style={{padding:'8px 10px'}}>
                  <div style={{fontSize:12, fontWeight:600}}>{name}</div>
                  <div className="mono" style={{fontSize:10, color:'var(--ink-3)'}}>{hex}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Type */}
        <div style={{padding:'0 32px', borderRight:'1px solid var(--rule)'}}>
          <Eyebrow num="B">Type</Eyebrow>
          <h3 className="serif" style={{fontSize:22, margin:'10px 0 18px'}}>Serif display, sans body.</h3>
          <div style={{borderTop:'1px solid var(--rule)'}}>
            <div style={{padding:'14px 0', borderBottom:'1px solid var(--rule)'}}>
              <div className="mono" style={{fontSize:10, color:'var(--ink-4)', marginBottom:4}}>SOURCE SERIF 4 · 56 / 0.96</div>
              <div className="display" style={{fontSize:48}}>Learn while you scroll.</div>
            </div>
            <div style={{padding:'14px 0', borderBottom:'1px solid var(--rule)'}}>
              <div className="mono" style={{fontSize:10, color:'var(--ink-4)', marginBottom:4}}>SOURCE SERIF 4 · 24 / 1.3</div>
              <div className="serif" style={{fontSize:22, color:'var(--ink-2)'}}>Spaced repetition for the doomscroll era.</div>
            </div>
            <div style={{padding:'14px 0', borderBottom:'1px solid var(--rule)'}}>
              <div className="mono" style={{fontSize:10, color:'var(--ink-4)', marginBottom:4}}>INTER · 14 / 1.6</div>
              <div style={{fontSize:14, color:'var(--ink-2)', lineHeight:1.6}}>Body copy uses Inter for clarity at small sizes. Dense settings, deck lists, and form fields stay legible without competing with display type.</div>
            </div>
            <div style={{padding:'14px 0'}}>
              <div className="mono" style={{fontSize:10, color:'var(--ink-4)', marginBottom:4}}>JETBRAINS MONO · 11 / TRACKED</div>
              <div className="mono" style={{fontSize:11, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--ink-3)'}}>02 · DECKS · 14 DUE TODAY</div>
            </div>
          </div>
        </div>

        {/* System */}
        <div style={{paddingLeft:32}}>
          <Eyebrow num="C">System</Eyebrow>
          <h3 className="serif" style={{fontSize:22, margin:'10px 0 18px'}}>Components &amp; rhythm.</h3>
          <div style={{display:'flex', gap:8, flexWrap:'wrap', marginBottom:16}}>
            <button className="btn btn-clay">Begin study</button>
            <button className="btn btn-ghost">Manage decks</button>
            <button className="btn btn-dark">Import →</button>
          </div>
          <div style={{display:'flex', gap:6, flexWrap:'wrap', marginBottom:18}}>
            <Pill tone="clay">14 due</Pill>
            <Pill tone="moss">retained</Pill>
            <Pill tone="ink">ACTIVE</Pill>
            <Pill>cloze</Pill>
            <Pill>mcq</Pill>
          </div>
          <div className="ascii" style={{background:'var(--card)', border:'1px solid var(--rule)', padding:14, fontSize:11, lineHeight:1.55}}>
{`┌─ LAYER CAKE ─────────────────────┐
│  L4  CONTENT  · injected quiz    │
│  L3  SCHEDULER · sm-2 algorithm  │
│  L2  STORAGE  · chrome.storage   │
│  L1  POPUP    · quick controls   │
│  L0  PAPER    · the surface      │
└──────────────────────────────────┘`}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================== */
/* DASHBOARD — DECKS                                               */
/* ============================================================== */
function DashChrome({ activeTab='decks' }) {
  const tabs = [
    ['study','Study','01'],
    ['decks','Decks','02'],
    ['notes','Notes','03'],
    ['import','Import','04'],
    ['settings','Settings','05'],
    ['stats','Statistics','06'],
  ];
  return (
    <>
      <div className="chrome">
        <span className="dot" style={{background:'#E8B4A0'}}/>
        <span className="dot" style={{background:'#E8D8A0'}}/>
        <span className="dot" style={{background:'#A8C9A0'}}/>
        <span className="url">chrome-extension://scrolllearn/dashboard#{activeTab}</span>
        <span style={{color:'var(--ink-4)'}}>v 0.4.2</span>
      </div>
      <header style={{padding:'40px 56px 0', display:'flex', justifyContent:'space-between', alignItems:'flex-start', borderBottom:'1px solid var(--rule)'}}>
        <div>
          <div style={{display:'flex', alignItems:'center', gap:14, marginBottom:18}}>
            <div style={{width:46, height:46, background:'var(--ink)', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--paper)', fontFamily:'Source Serif 4', fontSize:24, fontWeight:600}}>S</div>
            <div>
              <div className="mono" style={{fontSize:11, color:'var(--ink-3)', letterSpacing:'.14em'}}>SCROLL · LEARN</div>
              <div className="display" style={{fontSize:34, marginTop:2}}>The quiet feed.</div>
            </div>
          </div>
        </div>
        <div style={{textAlign:'right', paddingTop:8}}>
          <div className="mono" style={{fontSize:11, color:'var(--ink-3)'}}>SIGNED IN · TASS</div>
          <div className="mono" style={{fontSize:11, color:'var(--ink-4)', marginTop:2}}>14 DUE · STREAK 23</div>
          <div style={{display:'flex', justifyContent:'flex-end', gap:8, marginTop:10}}>
            <button className="btn btn-ghost" style={{padding:'6px 12px', fontSize:12}}>Sync</button>
            <button className="btn btn-clay" style={{padding:'6px 14px', fontSize:12}}>Begin study →</button>
          </div>
        </div>
      </header>

      <nav style={{padding:'0 56px', display:'flex', gap:36, borderBottom:'1px solid var(--rule)'}}>
        {tabs.map(([id,label,num])=>(
          <div key={id} className={'tab' + (activeTab===id ? ' active':'')}>
            <span className="glyph">{num}</span>
            <span>{label}</span>
          </div>
        ))}
      </nav>
    </>
  );
}

function DashboardDecks() {
  const decks = [
    { name:'Spanish, Volume I', desc:'Common words, B1 grammar, irregular verbs', cards:184, due:14, active:true, retention:.92, tag:'lang' },
    { name:'JavaScript Fundamentals', desc:'Closures, prototypes, async, type coercion', cards:96, due:8, active:false, retention:.84, tag:'eng' },
    { name:'World Capitals', desc:'Sovereign states &amp; territories', cards:212, due:0, active:false, retention:.78, tag:'geo' },
    { name:'Grammar Police · Apr', desc:'Articles · prepositions · word choice', cards:112, due:23, active:false, retention:.71, tag:'lang' },
  ];
  return (
    <div style={{width:1320, background:'var(--paper)'}}>
      <DashChrome activeTab="decks"/>

      <main style={{padding:'40px 56px 56px'}}>
        <div style={{display:'grid', gridTemplateColumns:'1fr 320px', gap:48}}>
          <div>
            <SectionHeader
              kicker="02 · Decks"
              title={<>Four decks. <span style={{fontStyle:'italic', color:'var(--clay)'}}>Forty&#8209;five</span> due across them.</>}
              sub="Each deck is a small library. Pick one to make active, or let the scheduler choose what is most overdue."
              action={<button className="btn btn-clay">＋ New deck</button>}
            />

            <table className="dtable" style={{marginTop:24}}>
              <thead>
                <tr>
                  <th style={{width:36}}>№</th>
                  <th>Deck</th>
                  <th style={{width:110}}>Cards</th>
                  <th style={{width:110}}>Due</th>
                  <th style={{width:160}}>Retention</th>
                  <th style={{width:120}}></th>
                </tr>
              </thead>
              <tbody>
                {decks.map((d,i)=>(
                  <tr key={d.name}>
                    <td className="mono" style={{color:'var(--ink-4)'}}>{String(i+1).padStart(2,'0')}</td>
                    <td>
                      <div style={{display:'flex', alignItems:'baseline', gap:10}}>
                        <span className="serif" style={{fontSize:18, fontWeight:600}}>{d.name}</span>
                        {d.active && <Pill tone="ink">active</Pill>}
                      </div>
                      <div style={{fontSize:12.5, color:'var(--ink-3)', marginTop:3}} dangerouslySetInnerHTML={{__html:d.desc}}/>
                    </td>
                    <td className="mono" style={{fontSize:14}}>{d.cards}</td>
                    <td>
                      {d.due>0
                        ? <span className="serif" style={{fontSize:18, color:'var(--clay-deep)', fontWeight:600}}>{d.due}</span>
                        : <span className="mono" style={{color:'var(--ink-4)', fontSize:12}}>— none</span>}
                    </td>
                    <td>
                      <div style={{display:'flex', alignItems:'center', gap:10}}>
                        <div className="bar" style={{flex:1}}><i style={{width: (d.retention*100)+'%'}}/></div>
                        <span className="mono" style={{fontSize:12, color:'var(--ink-3)'}}>{Math.round(d.retention*100)}%</span>
                      </div>
                    </td>
                    <td style={{textAlign:'right'}}>
                      <a className="ulink" style={{fontSize:12, marginRight:14}}>open</a>
                      <a className="ulink" style={{fontSize:12, color:'var(--ink-3)'}}>···</a>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>

            {/* Expanded deck — diagrammatic */}
            <div style={{marginTop:48}}>
              <Eyebrow num="02·A">Spanish, Volume I — expanded</Eyebrow>
              <div className="card-flat" style={{marginTop:14, padding:'28px 32px'}}>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', borderTop:'1px solid var(--rule)', borderBottom:'1px solid var(--rule)'}}>
                  {[
                    ['Cards','184'],
                    ['Due now','14'],
                    ['New','22'],
                    ['Avg ease','2.4'],
                  ].map(([k,v])=>(
                    <div key={k} style={{padding:'18px 0', borderRight:'1px solid var(--rule)'}}>
                      <div className="eyebrow">{k}</div>
                      <div className="display" style={{fontSize:38, marginTop:6}}>{v}</div>
                    </div>
                  ))}
                </div>

                {/* Card composition — ASCII layer cake */}
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:32, marginTop:28}}>
                  <div>
                    <Eyebrow>Card mix</Eyebrow>
                    <pre className="ascii" style={{margin:'10px 0 0', fontSize:12}}>

/* Each "scroll" is a horizontal rule + curl — feed line as scroll bar */

function LogoMark({ size=64, variant='A', tone='ink' }) {
  // Variants: A=stacked-bars-curl, B=ess-scroll, C=open-book-S, D=ascii-S, E=monogram
  const fg = tone==='paper' ? 'var(--paper)' : tone==='clay' ? 'var(--clay)' : 'var(--ink)';
  const accent = tone==='paper' ? 'var(--clay)' : tone==='clay' ? 'var(--paper)' : 'var(--clay)';

  if (variant==='A') {
    // Three feed posts being rolled into a scroll
    const s = size;
    return (
      <svg viewBox="0 0 64 64" width={s} height={s}>
        {/* three "post" rules */}
        <rect x="14" y="16" width="36" height="3" fill={fg}/>
        <rect x="14" y="26" width="28" height="3" fill={fg}/>
        <rect x="14" y="36" width="32" height="3" fill={fg}/>
        {/* rolled curl on the right */}
        <path d="M 50 12 Q 60 32 50 52" fill="none" stroke={accent} strokeWidth="3" strokeLinecap="round"/>
        <circle cx="50" cy="46" r="3" fill={accent}/>
      </svg>
    );
  }
  if (variant==='B') {
    // S as scroll — two curls
    return (
      <svg viewBox="0 0 64 64" width={size} height={size}>
        <path d="M 46 18 Q 46 12 38 12 L 22 12 Q 14 12 14 20 Q 14 28 22 28 L 42 28 Q 50 28 50 36 Q 50 44 42 44 L 26 44 Q 18 44 18 50"
              fill="none" stroke={fg} strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx="14" cy="20" r="2.5" fill={accent}/>
        <circle cx="50" cy="36" r="2.5" fill={accent}/>
      </svg>
    );
  }
  if (variant==='C') {
    // Open book / spread, with crease and clay underline
    return (
      <svg viewBox="0 0 64 64" width={size} height={size}>
        <rect x="10" y="14" width="44" height="36" fill="none" stroke={fg} strokeWidth="2.5"/>
        <line x1="32" y1="14" x2="32" y2="50" stroke={fg} strokeWidth="2"/>
        <line x1="14" y1="22" x2="28" y2="22" stroke={fg} strokeWidth="1.5"/>
        <line x1="14" y1="28" x2="28" y2="28" stroke={fg} strokeWidth="1.5"/>
        <line x1="14" y1="34" x2="24" y2="34" stroke={fg} strokeWidth="1.5"/>
        <line x1="36" y1="22" x2="50" y2="22" stroke={fg} strokeWidth="1.5"/>
        <line x1="36" y1="28" x2="46" y2="28" stroke={fg} strokeWidth="1.5"/>
        <line x1="36" y1="34" x2="50" y2="34" stroke={accent} strokeWidth="2.5"/>
        <line x1="36" y1="40" x2="42" y2="40" stroke={fg} strokeWidth="1.5"/>
      </svg>
    );
  }
  if (variant==='D') {
    // Stamp / monogram in a circle
    return (
      <svg viewBox="0 0 64 64" width={size} height={size}>
        <circle cx="32" cy="32" r="26" fill="none" stroke={fg} strokeWidth="2"/>
        <text x="32" y="40" textAnchor="middle" fontFamily="Source Serif 4, Georgia, serif" fontSize="30" fontWeight="600" fontStyle="italic" fill={fg}>S</text>
        <circle cx="49" cy="20" r="3.2" fill={accent}/>
      </svg>
    );
  }
  // E — square block monogram (current dashboard chip)
  return (
    <svg viewBox="0 0 64 64" width={size} height={size}>
      <rect x="6" y="6" width="52" height="52" rx="6" fill={fg}/>
      <text x="32" y="44" textAnchor="middle" fontFamily="Source Serif 4, Georgia, serif" fontSize="34" fontWeight="600" fill={accent}>S</text>
    </svg>
  );
}

                  </span>
                  <span style={{display:'flex', alignItems:'center', gap:6, fontSize:12, color:'var(--ink-3)'}}>
                    <kbd className="mono" style={{padding:'2px 7px', border:'1px solid var(--rule-2)', borderRadius:4, fontSize:10, background:'var(--paper-2)'}}>?</kbd> reveal
                  </span>
                </div>
                <button className="btn btn-clay">Submit answer</button>
              </div>

              {/* Inline edit / delete */}
              <div style={{display:'flex', gap:12, marginTop:22, paddingTop:18, borderTop:'1px solid var(--rule)'}}>
                <a className="ulink" style={{fontSize:12, color:'var(--ink-3)'}}>Edit card</a>
                <a className="ulink" style={{fontSize:12, color:'var(--ink-3)'}}>Delete</a>
                <a className="ulink" style={{fontSize:12, color:'var(--ink-3)'}}>Bury until tomorrow</a>
              </div>
            </div>

            {/* Reveal preview — what the answered state looks like */}
            <div style={{marginTop:36}}>
              <Eyebrow num="A·2">After reveal · grade your recall</Eyebrow>
              <div className="card-flat" style={{marginTop:12, padding:'28px 32px', background:'var(--clay-wash)', border:'1px solid var(--clay-tint)'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline'}}>
                  <div className="serif" style={{fontSize:22, fontWeight:600, color:'var(--clay-deep)'}}>xem xét</div>
                  <Pill tone="clay">your answer matched</Pill>
                </div>
                <div className="serif" style={{fontSize:14, color:'var(--ink-3)', marginTop:8, fontStyle:'italic'}}>
                  Also: cân nhắc · duyệt qua. Used in formal workplace contexts.
                </div>
                <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:8, marginTop:18}}>
                  {[
                    ['Again','+ 1 d','rose'],
                    ['Hard','+ 3 d','gold'],
                    ['Good','+ 7 d','clay'],
                    ['Easy','+ 14 d','moss'],
                  ].map(([l,d,c])=>{
                    const colors = { rose:'var(--rose)', gold:'var(--gold)', clay:'var(--clay)', moss:'var(--moss)' };
                    return <div key={l} style={{padding:'12px 0', textAlign:'center', border:'1px solid var(--rule-2)', borderRadius:8, background:'var(--paper)'}}>
                      <div className="serif" style={{fontSize:15, fontWeight:600, color:colors[c]}}>{l}</div>
                      <div className="mono" style={{fontSize:10, color:'var(--ink-4)', marginTop:2}}>{d}</div>
                    </div>;
                  })}
                </div>
              </div>
            </div>
          </div>

          {/* SIDE RAIL */}
          <aside>
            <Eyebrow num="B">Queue</Eyebrow>
            <div className="card-flat" style={{marginTop:12}}>
              {[
                ['07','review','xem xét','done · good'],
                ['08','rollback','quay lui','current'],
                ['09','staging','môi trường thử nghiệm','queued'],
                ['10','throughout','xuyên suốt','queued'],
                ['11','merge conflict','xung đột hợp nhất','queued'],
                ['12','pipeline','chu trình','queued'],
              ].map(([n,en,vi,state],i)=>{
                const isCurrent = state==='current';
                const isDone = state.startsWith('done');
                return (
                  <div key={n} style={{padding:'12px 18px', borderBottom:'1px solid var(--rule)', display:'flex', alignItems:'center', gap:12,
                    background: isCurrent ? 'var(--clay-wash)' : 'transparent',
                    borderLeft: isCurrent ? '3px solid var(--clay)' : '3px solid transparent'}}>
                    <span className="mono" style={{fontSize:11, color: isCurrent ? 'var(--clay-deep)' : 'var(--ink-4)', width:20}}>{n}</span>
                    <div style={{flex:1, minWidth:0}}>
                      <div className="serif" style={{fontSize:14, fontWeight: isCurrent?700:500, color: isDone ? 'var(--ink-3)' : 'var(--ink)'}}>
                        {en} <span style={{color:'var(--ink-4)'}}>·</span> <span style={{color: isCurrent ? 'var(--clay-deep)' : 'var(--ink-2)', fontStyle:'italic'}}>{vi}</span>
                      </div>
                    </div>
                    <span className="mono" style={{fontSize:10, color: isDone ? 'var(--moss)' : isCurrent ? 'var(--clay-deep)' : 'var(--ink-4)', textTransform:'uppercase', letterSpacing:'.08em'}}>{state}</span>
                  </div>
                );
              })}
              <div style={{padding:'10px 18px', textAlign:'center'}}>
                <span className="mono" style={{fontSize:10, color:'var(--ink-4)'}}>+ 17 MORE</span>
              </div>
            </div>

            <Eyebrow num="C">This session</Eyebrow>
            <div className="card-flat" style={{padding:18, marginTop:12}}>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
                <div>
                  <div className="eyebrow" style={{fontSize:10}}>Accuracy</div>
                  <div className="display" style={{fontSize:30, marginTop:2}}>86%</div>
                </div>
                <div>
                  <div className="eyebrow" style={{fontSize:10}}>Avg time</div>
                  <div className="display" style={{fontSize:30, marginTop:2}}>4.1<span style={{fontSize:14, color:'var(--ink-3)'}}>s</span></div>
                </div>
              </div>
              <hr className="rule" style={{margin:'14px 0'}}/>
              <div className="ascii" style={{fontSize:11, lineHeight:1.5}}>
{`right ████████████░░░░░░░ 06
wrong █░░░░░░░░░░░░░░░░░░ 01
left  ████████████████░░░ 16`}
              </div>
            </div>

            <Eyebrow num="D">Hint</Eyebrow>
            <div className="card-flat" style={{padding:'14px 16px', marginTop:12, background:'var(--paper-2)'}}>
              <div className="serif" style={{fontSize:13, color:'var(--ink-2)', fontStyle:'italic'}}>
                Verb · two syllables. Often paired with <span className="mono" style={{fontStyle:'normal', fontSize:11, background:'var(--card)', padding:'1px 5px', border:'1px solid var(--rule)'}}>kỹ</span> ("carefully").
              </div>
            </div>
          </aside>
        </div>
      </main>
    </div>
  );
}
